<!DOCTYPE html><html lang="zh-CN">
<head><meta charset="UTF-8"><meta name="viewport" content="width=1920,height=1080">
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
:root{    --bg: #1a0a05;
    --card: #3a1a10;
    --accent: #f97316;
    --accent2: #ef4444;
    --text: #fff7ed;
    --textDim: #fdba74;
    --fontTitle: 900;
    --radius: 8px;
    --grid: none;--w:1920px;--h:1080px;--margin:clamp(40px,6vw,120px);--fs-hero:clamp(72px,10vw,130px);--fs-h1:clamp(56px,7vw,100px);--fs-h2:clamp(42px,5vw,72px);--fs-body:clamp(22px,2.5vw,36px);--fs-small:clamp(16px,1.8vw,28px);--font-sans:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;--font-display:"Georgia","Times New Roman",var(--font-sans),serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:var(--w);height:var(--h);overflow:hidden;background:var(--bg);font-family:var(--font-sans);color:var(--text);position:relative}
.slide{position:absolute;top:0;left:0;width:var(--w);height:var(--h);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:1;text-wrap:pretty}
h1,h2,h3{text-wrap:balance}
.swiss-hero{padding:0 var(--margin)}.swiss-hero h1{font-family:var(--font-display);font-size:var(--fs-hero);font-weight:900;line-height:1.08;max-width:1500px}
.swiss-hero .lead{font-size:var(--fs-body);color:var(--textDim);margin-top:clamp(16px,2vw,32px);max-width:900px}
.accent-bar{position:absolute;top:0;left:0;width:1px;height:100%;background:var(--accent);transform-origin:left}
.swiss-statement{padding:0 var(--margin);text-align:left;width:1600px;position:relative}
.swiss-statement .num{font-size:clamp(140px,18vw,220px);font-weight:900;color:var(--accent);line-height:1;opacity:.1;position:absolute;top:60px;left:var(--margin)}
.swiss-statement h2{font-size:var(--fs-h1);font-weight:900;line-height:1.15;position:relative;z-index:1}
.swiss-statement p{font-size:var(--fs-body);color:var(--textDim);margin-top:20px;max-width:1000px}
.swiss-split{display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,5vw,80px);padding:0 var(--margin);width:100%}
.swiss-split h2{font-size:var(--fs-h2);font-weight:900}
.swiss-split .label{font-size:var(--fs-small);font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:4px}
.swiss-quote{padding:0 clamp(60px,8vw,160px);text-align:left;width:1600px}
.swiss-quote .rule{width:80px;height:1px;background:var(--accent);margin-bottom:40px}
.swiss-quote blockquote{font-family:var(--font-display);font-size:var(--fs-h2);font-weight:700;line-height:1.3}
.swiss-kpi{display:flex;flex-direction:column;align-items:center;gap:12px}
.swiss-kpi .num{font-size:clamp(120px,18vw,200px);font-weight:900;color:var(--accent);line-height:1}
h1{font-family:var(--font-display);font-size:var(--fs-h1);font-weight:var(--fontTitle)}
h2{font-size:var(--fs-h2);font-weight:var(--fontTitle)}
.tag{display:inline-block;background:var(--accent);color:var(--bg);font-size:var(--fs-small);font-weight:800;padding:6px 22px;border-radius:2px;margin-bottom:24px}
.img-bg{position:absolute;top:0;left:0;width:100%;height:100%;background-size:cover;background-position:center;z-index:0;filter:brightness(0.55) saturate(0.8)}
.img-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(180deg,rgba(0,0,0,0.3),rgba(0,0,0,0.65));z-index:0}
.slide.has-img .slide-inner{position:relative;z-index:1}
.slide.has-img h1,.slide.has-img h2,.slide.has-img blockquote{text-shadow:0 2px 20px rgba(0,0,0,0.5)}
</style></head><body>
<div id="comp" data-composition-id="main" data-start="0" data-duration="18.0" data-width="1920" data-height="1080">
<section id="s0" class="slide hero has-img" data-start="0.0" data-duration="4.0"><div class="img-bg" style="background-image:url(images/img_0.jpg)"></div><div class="img-overlay"></div><div class="slide-inner"><h2 id="s0_t">你以为的常识</h2><p id="s0_s">其实是错的</p><div id="s0_h" class="tag">反直觉</div></div></section>
<section id="s1" class="slide kpi_bold has-img" data-start="4.0" data-duration="2.5"><div class="img-bg" style="background-image:url(images/img_1.jpg)"></div><div class="img-overlay"></div><div class="slide-inner"><h2 id="s1_t">大多数人错了</h2><p id="s1_s">测试中常见错误认知颠覆直觉</p><div id="s1_h" class="tag">80%错误</div></div></section>
<section id="s2" class="slide split_col has-img" data-start="6.5" data-duration="2.5"><div class="img-bg" style="background-image:url(images/img_2.jpg)"></div><div class="img-overlay"></div><div class="slide-inner"><h2 id="s2_t">数据不会说谎</h2><p id="s2_s">核心对比与趋势揭示真相</p><div id="s2_h" class="tag">真相</div></div></section>
<section id="s3" class="slide quote_slide has-img" data-start="9.0" data-duration="2.5"><div class="img-bg" style="background-image:url(images/img_3.jpg)"></div><div class="img-overlay"></div><div class="slide-inner"><h2 id="s3_t">认知偏差</h2><p id="s3_s">信息茧房让我们误判</p><div id="s3_h" class="tag">偏差</div></div></section>
<section id="s4" class="slide hero has-img" data-start="11.5" data-duration="4.0"><div class="img-bg" style="background-image:url(images/img_4.jpg)"></div><div class="img-overlay"></div><div class="slide-inner"><h2 id="s4_t">换个角度</h2><p id="s4_s">重新定义测试，抓住本质</p><div id="s4_h" class="tag">新视角</div></div></section>
<section id="s5" class="slide statement has-img" data-start="15.5" data-duration="2.5"><div class="img-bg" style="background-image:url(images/img_5.jpg)"></div><div class="img-overlay"></div><div class="slide-inner"><h2 id="s5_t">三步法改变</h2><p id="s5_s">日常实践，从测试开始</p><div id="s5_h" class="tag">行动</div></div></section>
</div>

tl.from("#s0_s",{opacity:0,y:20,duration:0.5},0.1);

tl.from("#s3_s",{opacity:0,y:20,duration:0.5},9.2);
tl.from("#s4_t",{opacity:0,y:25,duration:0.6},11.5);
tl.from("#s4_s",{opacity:0,y:20,duration:0.5},11.7);

tl.from("#s5_s",{opacity:0,y:20,duration:0.5},15.7);window.__timelines["main"]=tl</script>
</body></html>
